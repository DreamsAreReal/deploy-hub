# Reusable deploy workflow: build image in CI, push to GHCR, trigger the
# deploy runner on the VPS over SSH (forced-command key, see server/runner.sh).
#
# Caller stub (in the app repo) is ~8 lines:
#
#   on:
#     push: {branches: [main]}
#   permissions: {contents: read, packages: write}
#   jobs:
#     deploy:
#       uses: DreamsAreReal/deploy-hub/.github/workflows/deploy.yml@main
#       with: {app: myapp}
#       secrets: inherit
#
# Required caller secrets: VPS_SSH_KEY (deploy key private part).
# Optional: TG_TOKEN, TG_CHAT_ID (CI-side failure card; the runner sends
# success/rollback cards itself from the VPS).

name: deploy

on:
  workflow_call:
    inputs:
      app:
        description: App name, must match a line in /opt/deploy-hub/apps.list on the VPS
        required: true
        type: string
      dockerfile:
        description: Path to the Dockerfile inside the repo (some repos keep it out of the root)
        required: false
        type: string
        default: Dockerfile

env:
  VPS_HOST: 192.3.94.42
  VPS_USER: deploy
  # Public host key of the VPS, pinned (not a secret; protects against MITM).
  VPS_HOST_KEY: 192.3.94.42 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAF9Gn795UXl0G01WWVsfcCqvBPEIs/bwX7cAU1DEQoi

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate app name
        env:
          APP: ${{ inputs.app }}
        run: |
          # App name feeds shell commands and the image path: keep it strict.
          echo "$APP" | grep -Eq '^[a-z0-9][a-z0-9._-]{0,40}$' \
            || { echo "invalid app name: $APP"; exit 1; }

      - name: Record start time
        id: start
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Check out
        uses: actions/checkout@v4

      - name: Check out deploy-hub (compose renderer)
        uses: actions/checkout@v4
        with:
          repository: DreamsAreReal/deploy-hub
          path: .deploy-hub
          ref: main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve the build context (bring-your-own-compose)
        id: ctx
        env:
          APP: ${{ inputs.app }}
          DOCKERFILE: ${{ inputs.dockerfile }}
        run: |
          # BYOC: if the repo ships a docker-compose.yml, render a deploy-ready
          # copy (build:->image via DEPLOY_IMAGE, safe defaults, sidecars intact)
          # and figure out which Dockerfile builds the MAIN service so CI builds
          # exactly that image. No compose in the repo => template/Dockerfile path.
          COMPOSE=""
          for f in docker-compose.yml docker-compose.yaml compose.yml; do
            [ -f "$f" ] && { COMPOSE="$f"; break; }
          done
          DF="$DOCKERFILE"
          if [ -n "$COMPOSE" ]; then
            pip install --quiet pyyaml >/dev/null 2>&1 || true
            META="$(python3 .deploy-hub/server/compose-render.py "$APP" "$COMPOSE" rendered-compose.yml)"
            echo "$META"
            # the main service's build context tells CI what Dockerfile to build
            DF="$(python3 .deploy-hub/server/compose-main-dockerfile.py "$APP" "$COMPOSE")"
            {
              echo "byoc=1"
              echo "$META"   # main=, port=, public=, health=
            } >> "$GITHUB_OUTPUT"
          else
            echo "byoc=0" >> "$GITHUB_OUTPUT"
          fi
          echo "dockerfile=$DF" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        env:
          APP: ${{ inputs.app }}
          DOCKERFILE: ${{ steps.ctx.outputs.dockerfile }}
        run: |
          OWNER="$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/${APP}"
          TAG="sha-${GITHUB_SHA}"
          # build the MAIN service image only (sidecars are pulled on the VPS);
          # -f may point inside a service build context resolved above
          CTX="$(dirname "$DOCKERFILE")"; [ "$CTX" = "." ] && CTX="."
          docker build \
            -f "$DOCKERFILE" \
            --build-arg GIT_SHA="$GITHUB_SHA" \
            --build-arg BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$IMAGE:$TAG" -t "$IMAGE:latest" "$CTX"
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"

      - name: Deploy on VPS
        env:
          APP: ${{ inputs.app }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          START_EPOCH: ${{ steps.start.outputs.epoch }}
          BYOC: ${{ steps.ctx.outputs.byoc }}
          BYOC_MAIN: ${{ steps.ctx.outputs.main }}
          BYOC_PORT: ${{ steps.ctx.outputs.port }}
          BYOC_HEALTH: ${{ steps.ctx.outputs.health }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$VPS_HOST_KEY" >> ~/.ssh/known_hosts
          SUBJECT="$(git log -1 --pretty=%s | tr -d '\r\n' | cut -c1-120)"
          # Runner protocol: command carries only verb+app+tag; everything else
          # (ephemeral GITHUB_TOKEN for GHCR pull, metadata) goes via stdin so
          # it never appears in argv, shell history or the SSH command string.
          # BYOC: also stream the rendered compose (base64) + its metadata; the
          # runner writes it as the app's compose and drives the whole stack.
          {
            printf 'token=%s\n' "$GH_TOKEN"
            printf 'actor=%s\n'  "$ACTOR"
            printf 'subject=%s\n' "$SUBJECT"
            printf 'start=%s\n'  "$START_EPOCH"
            if [ "$BYOC" = 1 ]; then
              printf 'compose=%s\n' "$(base64 -w0 rendered-compose.yml)"
              printf 'main=%s\n'  "$BYOC_MAIN"
              printf 'hport=%s\n' "$BYOC_PORT"
              printf 'hmode=%s\n' "$BYOC_HEALTH"
            fi
          } | ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
                "$VPS_USER@$VPS_HOST" "deploy $APP sha-${GITHUB_SHA}"

      - name: Failure card (CI side)
        # The runner reports deploys that reached the VPS; this catches
        # build/push/ssh failures that never got there. Skips silently when
        # TG secrets are not configured.
        if: failure()
        env:
          APP: ${{ inputs.app }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT_ID" ] || { echo "TG secrets not set, skipping card"; exit 0; }
          SHA7="$(echo "$GITHUB_SHA" | cut -c1-7)"
          TEXT="$(printf '❌ %s CI failed before deploy\n%s • see Actions log\n%s' "$APP" "$SHA7" "$RUN_URL")"
          curl -sS -m 10 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" >/dev/null || true
